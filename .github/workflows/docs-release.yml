name: Docs Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release version or tag to publish, for example v1.0.0 or 1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: docs-release
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt

      - name: Configure Git identity
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Resolve docs version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            raw_version="${{ github.event.release.tag_name }}"
          else
            raw_version="${{ inputs.version }}"
          fi
          release_version="${raw_version#v}"
          echo "raw=$raw_version" >> "$GITHUB_OUTPUT"
          echo "value=$release_version" >> "$GITHUB_OUTPUT"

      - name: Deploy release docs
        run: mike deploy --push --update-aliases "${{ steps.version.outputs.value }}" latest

      - name: Set latest as default
        run: mike set-default --push latest
