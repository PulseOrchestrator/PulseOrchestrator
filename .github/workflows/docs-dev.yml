name: Docs Dev

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
      - README.md
      - .github/workflows/docs-dev.yml
      - .github/workflows/docs-release.yml

permissions:
  contents: write

concurrency:
  group: docs-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt

      - name: Configure Git identity
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Deploy dev docs
        run: mike deploy --push --update-aliases dev

      - name: Set initial default version if needed
        shell: bash
        run: |
          versions="$(mike list || true)"
          if ! echo "$versions" | grep -q '(default)'; then
            mike set-default --push dev
          fi
