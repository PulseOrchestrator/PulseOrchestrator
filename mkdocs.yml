site_name: PulseOrchestrator Docs
site_description: Installation, operations, and feature documentation for PulseOrchestrator.
site_url: https://pulseorchestrator.github.io/PulseOrchestrator/
repo_url: https://github.com/PulseOrchestrator/PulseOrchestrator
repo_name: PulseOrchestrator/PulseOrchestrator
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - Install Guide: getting-started/install.md
  - Guides:
      - Feature Guide: guides/feature-guide.md
      - Configuration Reference: guides/configuration.md
      - PlaceholderAPI Integration: guides/placeholderapi.md
  - Plugin Development:
      - Bridge API: guides/bridge-api.md
